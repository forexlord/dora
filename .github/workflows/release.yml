name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: python -m ruff check core tests
      - name: Mypy
        run: python -m mypy core
      - name: Pytest
        run: python -m pytest

  release:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Dora-windows.zip
        shell: pwsh
        run: |
          ./scripts/build-release-zip.ps1
          if (-not (Test-Path Dora-windows.zip)) {
            throw "Dora-windows.zip was not created"
          }

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Dora ${{ github.ref_name }}
          files: Dora-windows.zip
          generate_release_notes: true
          draft: false
          prerelease: false
